<!DOCTYPE html>
<html>
<head>
  <title>Demo Request Form</title>
</head>
<body>
  <!-- This form is used for Netlify Forms detection -->
  <form name="demo-request" data-netlify="true" data-netlify-honeypot="bot-field" method="POST" hidden>
    <input type="hidden" name="form-name" value="demo-request" />
    <p class="hidden">
      <label>Don't fill this out if you're human: <input name="bot-field" /></label>
    </p>
    <input type="text" name="name" />
    <input type="text" name="business" />
    <input type="tel" name="phone" />
    <input type="email" name="email" />
    <input type="checkbox" name="kvkkAccepted" />
  </form>
</body>
</html>
